# CI (Stage 8.5): full test suite + eval quality gates on every push/PR;
# deploy to Render only after everything passes on master.
name: ci

on:
  pull_request:
  push:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ragp
          POSTGRES_PASSWORD: ragp
          POSTGRES_DB: ragp_test
        ports: ["55432:5432"]
        options: >-
          --health-cmd "pg_isready -U ragp" --health-interval 5s
          --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["56379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 5s --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned dependencies
        run: pip install -r requirements.txt

      - name: Cache ONNX models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-minilm-v1

      - name: Full test suite (unit + integration vs real services)
        env:
          RAGP_TEST_DATABASE_URL: postgresql://ragp:ragp@127.0.0.1:55432/ragp_test
          RAGP_TEST_REDIS_URL: redis://127.0.0.1:56379/0
        run: python -m pytest

      # THE metric rule (Stage 0): no change lands if it regresses the
      # committed baseline. Latency excluded (CI hardware varies);
      # quality metrics are bit-reproducible and must not move down.
      - name: Eval quality gate (skeleton, deterministic)
        env:
          ENVIRONMENT: development
        run: >-
          python eval/run_eval.py --pipeline skeleton
          --baseline eval/results/baseline.json
          --tag ci-skeleton --fail-on-regression

      - name: Eval quality gate (hybrid serving pipeline)
        env:
          ENVIRONMENT: development
        run: >-
          python eval/run_eval.py --pipeline hybrid
          --baseline eval/results/baseline.json
          --tag ci-hybrid --fail-on-regression

  deploy:
    # Auto-deploy to Render (Stage 8) only on master, only after tests
    # and eval gates pass. RENDER_DEPLOY_HOOK is a repo secret (Render
    # dashboard -> service -> Settings -> Deploy Hook). Until Render is
    # provisioned the step skips loudly rather than failing the build.
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK not configured; skipping deploy."
            exit 0
          fi
          curl -fsS "$HOOK"
          echo "deploy triggered"
